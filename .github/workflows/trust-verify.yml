# Trust Verify — adopts the Flow Agents external trust anchor on this repo (ADVISORY).
#
# On every PR, re-runs this repo's canonical verification FRESH in a clean CI
# environment an agent does not control — the same `npm test` + CLI pack-dry-run
# that ci.yml's "Test" job runs across all five workspaces (console-core, cli,
# telemetry, console-server, console-ui). If a Flow Agents session has published
# delivery/trust.bundle, it also RECONCILES the agent's claimed passes against
# CI's own fresh results and fails on any divergence. When no bundle is present,
# only the fresh verify is enforced (fail-open on bundle absence; fail-closed on
# divergence when present).
#
# ADVISORY PHASE: this workflow runs and reports but does NOT block merges yet.
# To ARM it: add "Trust Verify" as a required, no-bypass status check in this
# repo's branch protection (Settings → Branches → main).
#
# Adoption guide: https://github.com/kontourai/flow-agents/blob/main/docs/trust-anchor-adoption.md
name: Trust Verify

on:
  pull_request:

permissions:
  contents: read

jobs:
  trust-verify:
    name: Trust Verify
    runs-on: ubuntu-latest
    steps:
      # fetch-depth 0: the reconciler binds delivery bundles to commits via
      # `git merge-base --is-ancestor`, which cannot walk a shallow clone —
      # with the default depth-1 checkout every committed bundle looks stale
      # in CI (sealed commit never equals the synthetic merge SHA).
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Browsers for the workspace browser suite (test:browser, run inside `npm
      # test`), so delivery bundles claiming it reconcile here instead of being
      # unreconcilable on a bare runner — mirrors ci.yml's own "Install Playwright
      # browser" step.
      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      # The external anchor: re-run this repo's real verify fresh + reconcile any
      # delivered bundle. SHA-pinned (mutable tags are not trusted for a cross-repo
      # action that gates merges).
      #
      # verify-command mirrors ci.yml's "Test" job main verification exactly:
      # `npm test` (release-package-version + release-policy checks, root
      # typecheck, content-boundary check, all five workspaces' unit/typecheck
      # suites, dev-local tests, the Playwright browser suite, and the cli
      # tarball test) followed by the cli's own pack --dry-run integrity check —
      # the same two steps ci.yml's Test job runs after install.
      - uses: kontourai/flow-agents/.github/actions/trust-verify@f2efb33ef683793bbec01dcf7e909f3e1423c04d # flow-agents @ locked action runtime dependencies
        with:
          verify-command: "npm test && npm --workspace @kontourai/cli pack --dry-run"
