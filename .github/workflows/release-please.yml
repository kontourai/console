name: Release Please

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      target_tag:
        description: Optional immutable package tag to retry instead of running Release Please
        required: false
        type: string
        default: ''

permissions:
  contents: write
  pull-requests: write
  actions: write

jobs:
  release-please:
    if: github.event_name == 'push' || inputs.target_tag == ''
    runs-on: ubuntu-latest
    outputs:
      console_release_created: ${{ steps.release.outputs.release_created }}
      console_tag_name: ${{ steps.release.outputs.tag_name }}
      core_release_created: ${{ steps.release.outputs['console-core--release_created'] }}
      core_tag_name: ${{ steps.release.outputs['console-core--tag_name'] }}
      cli_release_created: ${{ steps.release.outputs['cli--release_created'] }}
      cli_tag_name: ${{ steps.release.outputs['cli--tag_name'] }}
    steps:
      # Release PRs authored by the default GITHUB_TOKEN (github-actions[bot])
      # get their CI runs held as action_required on every refresh. Minting a
      # token from the org's kontour-release-bot app makes the app the PR
      # author, so CI runs unassisted. See kontourai/flow-agents#38.
      - name: Mint app token
        id: app-token
        uses: actions/create-github-app-token@fee1f7d63c2ff003460e3d139729b119787bc349 # v2
        with:
          app-id: ${{ vars.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}

      - name: Run release-please
        id: release
        uses: googleapis/release-please-action@v4
        with:
          token: ${{ steps.app-token.outputs.token }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  # npm trusted publishing validates the calling workflow for workflow_call.
  # Keep retries under this same top-level identity as automatic releases.
  retry-publish:
    if: github.event_name == 'workflow_dispatch' && inputs.target_tag != ''
    uses: ./.github/workflows/publish-npm.yml
    with:
      target_tag: ${{ inputs.target_tag }}
    permissions:
      contents: read
      id-token: write


  # Call the workflow definition from this main revision while package contents
  # remain authoritative at each immutable Release Please tag.
  publish-core:
    needs: release-please
    if: needs.release-please.outputs.core_release_created == 'true'
    uses: ./.github/workflows/publish-npm.yml
    with:
      target_tag: ${{ needs.release-please.outputs.core_tag_name }}
    permissions:
      contents: read
      id-token: write

  publish-console:
    needs: [release-please, publish-core]
    if: >-
      always() &&
      needs.release-please.result == 'success' &&
      needs.release-please.outputs.console_release_created == 'true' &&
      (needs.publish-core.result == 'success' || needs.publish-core.result == 'skipped')
    uses: ./.github/workflows/publish-npm.yml
    with:
      target_tag: ${{ needs.release-please.outputs.console_tag_name }}
    permissions:
      contents: read
      id-token: write

  publish-cli:
    needs: [release-please, publish-core]
    if: >-
      always() &&
      needs.release-please.result == 'success' &&
      needs.release-please.outputs.cli_release_created == 'true' &&
      (needs.publish-core.result == 'success' || needs.publish-core.result == 'skipped')
    uses: ./.github/workflows/publish-npm.yml
    with:
      target_tag: ${{ needs.release-please.outputs.cli_tag_name }}
    permissions:
      contents: read
      id-token: write
