name: Publish NPM

on:
  push:
    tags:
      - 'v*'
      - 'cli-v*'
      - 'console-core-v*'
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

# Tag-push and the release workflow dispatch can both fire for one tag;
# serialize so the already-published guard skips cleanly (flow v0.1.20 race).
concurrency:
  group: publish-npm
  cancel-in-progress: false

jobs:
  verify:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: ['22', '24']
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          path: console

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: console/package-lock.json

      - name: Install
        run: npm ci --no-fund --no-audit
        working-directory: console

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium
        working-directory: console

      - name: Test
        run: npm test
        working-directory: console

      - name: Pack Dry Run
        run: npm pack --dry-run
        working-directory: console

      - name: Pack CLI Dry Run
        run: npm --workspace @kontourai/cli pack --dry-run
        working-directory: console

      - name: Pack Console Core Dry Run
        run: npm --workspace @kontourai/console-core pack --dry-run
        working-directory: console

  publish:
    needs: verify
    if: startsWith(github.ref, 'refs/tags/v') || startsWith(github.ref, 'refs/tags/cli-v') || startsWith(github.ref, 'refs/tags/console-core-v')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          path: console

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
          package-manager-cache: false

      - name: Install
        run: npm ci --no-fund --no-audit
        working-directory: console

      - name: Select package for release tag
        id: package
        run: node --import tsx scripts/npm-release-policy.ts select "${GITHUB_REF_NAME}"
        working-directory: console

      - name: Verify Tag Matches Package Version
        env:
          PACKAGE_MANIFEST: ${{ steps.package.outputs.manifest }}
          TAG_PREFIX: ${{ steps.package.outputs.tag_prefix }}
        run: |
          PACKAGE_VERSION=$(node -p "JSON.parse(require('node:fs').readFileSync(process.env.PACKAGE_MANIFEST, 'utf8')).version")
          if [ "${TAG_PREFIX}${PACKAGE_VERSION}" != "${GITHUB_REF_NAME}" ]; then
            echo "Tag ${GITHUB_REF_NAME} does not match ${PACKAGE_MANIFEST} version ${TAG_PREFIX}${PACKAGE_VERSION}" >&2
            exit 1
          fi
        working-directory: console

      - name: Verify Tagged Commit Is On Main
        run: |
          git fetch --no-tags origin +refs/heads/main:refs/remotes/origin/main
          if ! git merge-base --is-ancestor "${GITHUB_SHA}" "refs/remotes/origin/main"; then
            echo "Tagged commit ${GITHUB_SHA} is not reachable from the fetched origin/main tip" >&2
            exit 1
          fi
        working-directory: console

      - name: Check Published Version
        id: published
        env:
          PACKAGE_MANIFEST: ${{ steps.package.outputs.manifest }}
        run: |
          PACKAGE_NAME=$(node -p "JSON.parse(require('node:fs').readFileSync(process.env.PACKAGE_MANIFEST, 'utf8')).name")
          PACKAGE_VERSION=$(node -p "JSON.parse(require('node:fs').readFileSync(process.env.PACKAGE_MANIFEST, 'utf8')).version")
          VIEW_OUTPUT=$(mktemp)
          if npm view "${PACKAGE_NAME}" versions --json >"${VIEW_OUTPUT}" 2>&1; then
            if node -e 'const fs=require("node:fs"); const versions=JSON.parse(fs.readFileSync(process.argv[1],"utf8")); process.exit((Array.isArray(versions)?versions:[versions]).includes(process.argv[2])?0:1)' "${VIEW_OUTPUT}" "${PACKAGE_VERSION}"; then
              echo "published=true" >> "${GITHUB_OUTPUT}"
              echo "${PACKAGE_NAME}@${PACKAGE_VERSION} is already published; skipping npm publish."
            else
              echo "published=false" >> "${GITHUB_OUTPUT}"
            fi
          elif grep -Fq "E404" "${VIEW_OUTPUT}" && grep -Fq "${PACKAGE_NAME}" "${VIEW_OUTPUT}" && grep -Eq "(is not in this registry|Not found)" "${VIEW_OUTPUT}"; then
            # The only tolerated lookup failure is an exact public-package absence.
            # Authentication, registry, network, policy, and malformed-response failures stay fatal.
            echo "published=false" >> "${GITHUB_OUTPUT}"
          else
            echo "npm registry lookup failed for ${PACKAGE_NAME}; refusing to classify it as unpublished." >&2
            cat "${VIEW_OUTPUT}" >&2
            exit 1
          fi
        working-directory: console

      - name: Verify CLI Core Dependency Is Public
        if: startsWith(github.ref, 'refs/tags/cli-v')
        run: node --import tsx scripts/verify-cli-core-release.ts
        working-directory: console

      - name: Publish
        if: steps.published.outputs.published != 'true'
        env:
          PACKAGE_WORKSPACE: ${{ steps.package.outputs.workspace }}
          PACKAGE_MANIFEST: ${{ steps.package.outputs.manifest }}
        run: |
          if [ "${PACKAGE_WORKSPACE}" = "." ]; then
            npm publish --access public --provenance
          else
            npm publish --workspace "${PACKAGE_WORKSPACE}" --access public --provenance
          fi

          PACKAGE_NAME=$(node -p "JSON.parse(require('node:fs').readFileSync(process.env.PACKAGE_MANIFEST, 'utf8')).name")
          PACKAGE_VERSION=$(node -p "JSON.parse(require('node:fs').readFileSync(process.env.PACKAGE_MANIFEST, 'utf8')).version")
          for ATTEMPT in 1 2 3 4 5; do
            if [ "$(npm view "${PACKAGE_NAME}@${PACKAGE_VERSION}" version)" = "${PACKAGE_VERSION}" ]; then
              echo "Confirmed ${PACKAGE_NAME}@${PACKAGE_VERSION} on npm."
              exit 0
            fi
            if [ "${ATTEMPT}" -lt 5 ]; then sleep 5; fi
          done
          echo "Publish returned success but ${PACKAGE_NAME}@${PACKAGE_VERSION} could not be confirmed on npm." >&2
          exit 1
        working-directory: console

      # Best-effort standalone publish of the shared contract package so other
      # repos (e.g. flow-agents) can depend on @kontourai/telemetry from
      # npm. Versioned independently of the root; the guard makes it idempotent.
      #
      # The FIRST publish of a new scoped package must be bootstrapped once by an
      # npm-org admin — CI tokens cannot create new packages (npm returns E404).
      # So this step is non-fatal: it warns with bootstrap instructions instead
      # of failing the release. Once bootstrapped, it publishes cleanly on bumps.
      - name: Publish console-telemetry (best-effort)
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          NAME=$(node -p "require('./telemetry/package.json').name")
          VERSION=$(node -p "require('./telemetry/package.json').version")
          if npm view "${NAME}@${VERSION}" version >/dev/null 2>&1; then
            echo "${NAME}@${VERSION} already published; skipping."
          elif npm publish -w "${NAME}" --access public --provenance; then
            echo "Published ${NAME}@${VERSION}."
          else
            echo "::warning::Could not publish ${NAME}@${VERSION} — likely the first publish of a new package (npm E404: CI tokens cannot create packages). Bootstrap once from an npm-org admin account: 'npm publish -w ${NAME} --access public', after which CI keeps it updated."
          fi
        working-directory: console
