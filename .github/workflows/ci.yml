name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # Suite-wide secret-scan gate, one normative source (kontourai/.github).
  secret-scan:
    name: Secret Scan
    uses: kontourai/.github/.github/workflows/secret-scan.yml@main
    permissions:
      contents: read

  test:
    name: Test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: ['22', '24']

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          path: console
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: console/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: console

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium
        working-directory: console

      - name: Run tests
        run: npm test
        working-directory: console
        env:
          KONTOUR_LOCK_INTEGRITY_BASE_REF: ${{ github.event.pull_request.base.sha || github.event.before || 'origin/main' }}
