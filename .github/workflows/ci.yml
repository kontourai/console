name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          path: kontour-console

      - name: Checkout Console Kit
        uses: actions/checkout@v4
        with:
          repository: kontourai/console-kit
          path: console-kit

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            kontour-console/package-lock.json
            console-kit/package-lock.json

      - name: Install Console Kit dependencies
        run: npm ci
        working-directory: console-kit

      - name: Build Console Kit
        run: npm run build
        working-directory: console-kit

      - name: Install dependencies
        run: npm ci
        working-directory: kontour-console

      - name: Run tests
        run: npm test
        working-directory: kontour-console
