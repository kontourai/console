# Local full-stack dev backing services: Postgres + a mock OIDC provider.
# The console runs on the HOST from source (npm run serve, hosted mode) — see
# docs/deployment/local-fullstack.md. Running the console on the host (not in a
# container) keeps it on the current code AND makes it reach the mock OIDC at the
# SAME localhost:8080 the browser uses, so the token `iss` is consistent (no
# container-vs-browser split-horizon).
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: console
      POSTGRES_PASSWORD: console
      POSTGRES_DB: console
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U console -d console"]
      interval: 3s
      timeout: 3s
      retries: 20
    volumes:
      - console-pgdata:/var/lib/postgresql/data

  # Mock OIDC provider — issues conformant OIDC tokens for the console's
  # Authorization-Code+PKCE login AND its access-token Resource Server.
  # Token claims (aud + org_id tenant claim) come from dev/mock-oidc.json.
  mock-oidc:
    image: ghcr.io/navikt/mock-oauth2-server:2.1.10
    ports:
      - "8080:8080"
    environment:
      # Bind the issuer host so `iss` is a stable http://localhost:8080/<issuerId>
      SERVER_PORT: "8080"
      JSON_CONFIG_PATH: /config/mock-oidc.json
    volumes:
      - ./dev/mock-oidc.json:/config/mock-oidc.json:ro

volumes:
  console-pgdata:
